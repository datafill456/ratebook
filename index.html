<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateBook — Daily Rates Entry & Distribution</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --ink:#0b1f33; --ink2:#12304d; --slate:#1d3d5c; --line:#2a4b6b;
  --paper:#f5f1e8; --paper2:#faf7f0; --card:#ffffff;
  --amber:#c8860d; --amber-soft:#e9c47a; --amber-bg:#fbf2dd;
  --green:#1f7a4d; --red:#b23b2e; --muted:#5f7386; --muted2:#8194a3;
  --focus:#e0a92e;
  --mono:"DM Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
a{color:var(--amber)}
.app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
/* Sidebar */
.side{background:var(--ink);color:#cdd9e4;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid #071726}
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--line)}
.brand .logo{font-family:var(--mono);font-weight:500;font-size:15px;letter-spacing:.14em;color:#fff}
.brand .logo b{color:var(--amber-soft)}
.brand .sub{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin-top:6px}
.navgroup{padding:14px 12px 4px}
.navgroup .gl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#59748c;padding:0 8px 8px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;color:#c3d1de;text-decoration:none;font-size:13px;cursor:pointer;line-height:1.2}
.nav a .dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex:none}
.nav a:hover{background:var(--ink2)}
.nav a.active{background:var(--slate);color:#fff}
.nav a.active .dot{background:var(--amber)}
.nav a .k{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted2)}
.side .foot{padding:16px 20px;font-size:10.5px;color:var(--muted2);border-top:1px solid var(--line);margin-top:8px;line-height:1.6}
/* Main */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--paper2);border-bottom:1px solid #e3dcc9;padding:14px 26px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.01em}
.topbar .crumbs{font-size:11px;color:var(--muted);letter-spacing:.04em;margin-top:2px}
.meta-inline{display:flex;align-items:center;gap:14px;margin-left:auto;font-size:12px}
.meta-inline .field{display:flex;align-items:center;gap:6px}
.meta-inline label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.meta-inline input{font-family:var(--mono);border:1px solid #d8cfb8;background:#fff;border-radius:6px;padding:5px 8px;font-size:12px;color:var(--ink);width:118px}
.meta-inline input.rate{width:78px;text-align:right}
.meta-inline input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px rgba(224,169,46,.18)}
.sync{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);letter-spacing:.03em}
.sync .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(31,122,77,.5)}
.sync.on .pulse{animation:pulse 1.1s ease-out}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,122,77,.55)}100%{box-shadow:0 0 0 9px rgba(31,122,77,0)}}
.content{padding:24px 26px 60px;max-width:1200px}
/* Cards & tables */
.card{background:var(--card);border:1px solid #e6e0d0;border-radius:12px;margin-bottom:22px;overflow:hidden;box-shadow:0 1px 2px rgba(11,31,51,.04)}
.card>.head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #eee7d6;background:linear-gradient(180deg,#fff, #fdfbf5)}
.card>.head h3{margin:0;font-size:13px;font-weight:600;letter-spacing:.02em}
.card>.head .tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--paper);border:1px solid #e6e0d0;padding:2px 7px;border-radius:20px}
.card>.head .actions{margin-left:auto;display:flex;gap:7px}
.card .body{padding:0}
.hint{font-size:11.5px;color:var(--muted);padding:9px 16px;border-bottom:1px solid #f0ead9;background:#fcfaf3;line-height:1.5}
.grid-wrap{overflow-x:auto}
table.grid{border-collapse:collapse;width:100%;font-size:12.5px}
table.grid th{background:var(--ink);color:#dfeaf3;font-weight:600;text-align:left;padding:8px 10px;font-size:11px;letter-spacing:.03em;position:sticky;top:0;white-space:nowrap}
table.grid th .colmenu{float:right;cursor:pointer;color:#7f9ab2;padding-left:8px}
table.grid th .colmenu:hover{color:#fff}
table.grid td{border-bottom:1px solid #eef0f2;padding:0}
table.grid tr:nth-child(even) td{background:#fbfcfd}
table.grid tr:hover td{background:var(--amber-bg)}
table.grid td input{width:100%;border:0;background:transparent;padding:7px 10px;font-family:var(--mono);font-size:12.5px;color:var(--ink)}
table.grid td.text input{font-family:var(--sans)}
table.grid td.num input{text-align:right}
table.grid td input:focus{outline:2px solid var(--focus);outline-offset:-2px;background:#fffdf6}
table.grid td.rowact{width:34px;text-align:center}
.iconbtn{border:0;background:transparent;cursor:pointer;color:var(--muted2);font-size:14px;line-height:1;padding:4px 6px;border-radius:5px}
.iconbtn:hover{background:#eef1f4;color:var(--red)}
tfoot td{padding:8px 10px;background:#fbf9f2}
/* Buttons */
.btn{border:1px solid #d8cfb8;background:#fff;color:var(--ink);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--sans)}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.amber{background:var(--amber);border-color:var(--amber);color:#fff}
.btn.amber:hover{background:#b3770a;color:#fff}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:#eef1f4;color:var(--ink)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.dark{background:var(--slate);border-color:var(--slate);color:#fff}
.btn.dark:hover{background:var(--ink2)}
/* Output document preview look */
.doc{background:#fff;border:1px solid #e6e0d0;border-radius:10px;padding:26px 30px;margin-bottom:22px;font-size:13px;box-shadow:0 1px 3px rgba(11,31,51,.05)}
.doc .dh{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}
.doc h2{font-size:16px;margin:2px 0 2px}
.doc .addr{color:var(--muted);font-size:12px;line-height:1.5;margin:8px 0}
.doc table.mini{border-collapse:collapse;margin:10px 0;font-family:var(--mono);font-size:12.5px}
.doc table.mini th{background:var(--ink);color:#fff;padding:6px 12px;text-align:right;font-weight:500;font-size:11px}
.doc table.mini th:first-child{text-align:left}
.doc table.mini td{border:1px solid #e7e2d4;padding:5px 12px;text-align:right}
.doc table.mini td:first-child{text-align:left;background:#faf7f0;font-family:var(--sans)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;align-items:start}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}.app{grid-template-columns:1fr}.side{position:static;height:auto}}
.pagehdr{margin:0 0 16px}
.pagehdr h2{font-size:19px;margin:0 0 4px;letter-spacing:-.01em}
.pagehdr p{margin:0;color:var(--muted);font-size:13px;max-width:720px;line-height:1.55}
.exportbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px 16px;background:var(--amber-bg);border:1px solid var(--amber-soft);border-radius:10px;margin-bottom:20px}
.exportbar .lbl{font-size:12px;color:#6b4e12;font-weight:600;letter-spacing:.03em}
.exportbar .fname{font-family:var(--mono);font-size:11px;color:#7a5a15}
/* Structure editor */
.colrow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f0ead9}
.colrow input{border:1px solid #ddd4bf;border-radius:6px;padding:5px 8px;font-size:12px}
.colrow .ck{font-family:var(--mono);font-size:11px;color:var(--muted);width:120px}
.colrow select{border:1px solid #ddd4bf;border-radius:6px;padding:5px 6px;font-size:12px}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;background:var(--paper);border:1px solid #e6e0d0;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(11,31,51,.28);opacity:0;transform:translateY(8px);transition:.22s;z-index:100;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:none}
.toast .ok{color:var(--amber-soft)}
.flow{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.flow .chip{font-size:11px;background:#fff;border:1px solid #e6e0d0;border-radius:20px;padding:4px 10px;color:var(--muted)}
.flow .chip b{color:var(--ink);font-weight:600}
.kbd{font-family:var(--mono);font-size:10.5px;background:#eef1f4;border:1px solid #dbe2e8;border-radius:4px;padding:1px 5px;color:var(--muted)}
.subtabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid #e3dcc9;flex-wrap:wrap}
.subtabs button{border:0;background:transparent;padding:8px 14px;font-size:12.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--sans)}
.subtabs button.active{color:var(--ink);border-bottom-color:var(--amber);font-weight:600}
.hidden{display:none!important}
.small{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">RATE<b>·</b>BOOK</div>
      <div class="sub">One entry · every sheet</div>
    </div>
    <div class="navgroup">
      <div class="nav" id="nav-entry"></div>
    </div>
    <div class="navgroup">
      <div class="gl" style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#59748c;padding:0 8px 8px">Distribution sheets</div>
      <div class="nav" id="nav-views"></div>
    </div>
    <div class="navgroup">
      <div class="gl" style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#59748c;padding:0 8px 8px">Configure</div>
      <div class="nav" id="nav-config"></div>
    </div>
    <div class="foot">
      Enter rates once. Every distribution sheet updates automatically. Export each as its own <span class="kbd">.xlsx</span>.
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pgTitle">Data Entry</h1>
        <div class="crumbs" id="pgCrumb">Master rates</div>
      </div>
      <div class="meta-inline">
        <div class="field"><label>Report date</label><input type="date" id="mReportDate"></div>
        <div class="field"><label>Spot bid</label><input class="rate" id="mSpotBid"></div>
        <div class="field"><label>Spot offer</label><input class="rate" id="mSpotOffer"></div>
        <div class="sync" id="syncBadge"><span class="pulse"></span><span id="syncText">Synced</span></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="toast" id="toast"><span class="ok">✓</span><span id="toastMsg">Saved</span></div>

<script>/* ============================================================
   MVS Rate Desk — client-side, GitHub-Pages friendly.
   Single source of truth (DB) -> many distribution sheets.
   ============================================================ */
const SEED = JSON.parse(document.getElementById('seed').textContent);
const LS_KEY = 'mvs_rate_desk_v1';
let mem = null; // fallback store if localStorage blocked

function load(){
  try{ const s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s); }catch(e){}
  if(mem) return mem;
  return JSON.parse(JSON.stringify(SEED));
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){ mem = JSON.parse(JSON.stringify(DB)); }
  flashSync();
}
let DB = load();
// Spot lives only in the top bar (single source). Drop any legacy SPOT row in outright.
if(DB.tables && DB.tables.outright){
  DB.tables.outright.rows = DB.tables.outright.rows.filter(r=>String(r.period).toUpperCase()!=='SPOT');
}

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function parseDate(v){ // accept 'YYYY-MM-DD' or 'd-mmm-yyyy' or Date
  if(!v && v!==0) return null;
  if(v instanceof Date) return v;
  if(typeof v==='number'){ const d=new Date(Date.UTC(1899,11,30)); d.setUTCDate(d.getUTCDate()+v); return d; }
  const s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/); if(m){const mo=MONTHS.findIndex(x=>x.toLowerCase()===m[2].toLowerCase()); if(mo>=0)return new Date(+m[3],mo,+m[1]);}
  const d=new Date(s); return isNaN(d)?null:d;
}
function fmtDate(v){ const d=parseDate(v); if(!d) return v||''; return d.getDate()+'-'+MONTHS[d.getMonth()]+'-'+d.getFullYear(); }
function toISO(v){ const d=parseDate(v); if(!d) return v||''; const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function excelSerial(v){ const d=parseDate(v); if(!d) return null; const base=Date.UTC(1899,11,30); return Math.round((Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())-base)/86400000); }
function num(v){ if(v===''||v==null) return null; const n=Number(v); return isNaN(n)?v:n; }
function nf(v,dec){ if(v==null||v==='') return ''; const n=Number(v); if(isNaN(n)) return v; return dec!=null? n.toFixed(dec): String(n); }

/* ---------- sync + toast ---------- */
let syncTimer=null;
function flashSync(){
  const b=$('#syncBadge'); b.classList.add('on'); $('#syncText').textContent='Saved';
  clearTimeout(syncTimer); syncTimer=setTimeout(()=>{ b.classList.remove('on'); $('#syncText').textContent='Synced'; },1200);
}
function toast(msg){
  const t=$('#toast'); $('#toastMsg').textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------- generic schema-driven grid ----------
   Renders DB.tables[name] as an editable grid. Any edit writes back,
   persists, refreshes the sync badge and re-renders the current page's
   dependents so distribution sheets stay in step ("autofill").          */
let pendingFocus=null;
function applyPendingFocus(){
  if(!pendingFocus) return;
  const {name,r,c}=pendingFocus; pendingFocus=null;
  const tbl=document.querySelector('table.grid[data-gridname="'+name+'"]');
  if(!tbl) return;
  const tr=tbl.querySelectorAll('tbody tr')[r]; if(!tr) return;
  const inp=[...tr.querySelectorAll('input')][c];
  if(inp){ inp.focus(); if(inp.select) inp.select(); }
}
/* write one value into a table cell with correct type coercion */
function writeCell(name,ri,ci,val){
  const t=DB.tables[name]; if(ci>=t.cols.length) return;
  while(t.rows.length<=ri){ const nr={}; t.cols.forEach(c=>nr[c[0]]=null); t.rows.push(nr); }
  const col=t.cols[ci], v=String(val).trim();
  if(col[2]==='num') t.rows[ri][col[0]] = v===''?null:num(v);
  else if(col[2]==='date') t.rows[ri][col[0]] = v===''?'':toISO(v);
  else t.rows[ri][col[0]] = v;
}
/* paste a block copied from Excel/another grid: fills down & right, adds rows */
function attachPaste(inp,name,ci,ri,opts){
  inp.addEventListener('paste',e=>{
    const cb=(e.clipboardData||window.clipboardData); if(!cb) return;
    const text=cb.getData('text'); if(!text || !/[\t\n]/.test(text)) return; // single value -> normal paste
    e.preventDefault();
    const grid=text.replace(/\r/g,'').replace(/\n$/,'').split('\n').map(l=>l.split('\t'));
    grid.forEach((line,gr)=> line.forEach((val,gc)=> writeCell(name,ri+gr,ci+gc,val)));
    save(); if(opts&&opts.onEdit)opts.onEdit();
    pendingFocus={name,r:ri,c:ci}; rerender();
    toast('Pasted '+grid.length+'×'+grid[0].length+' cells');
  });
}
/* spreadsheet-style keyboard movement on a grid input */
function attachNav(inp,name){
  inp.addEventListener('keydown',e=>{
    const tr=inp.closest('tr'), tbody=tr.parentNode;
    const rows=[...tbody.children];
    const r=rows.indexOf(tr);
    const c=[...tr.querySelectorAll('input')].indexOf(inp);
    const focusCell=(nr,nc)=>{ const row=rows[nr]; if(!row) return false;
      const tgt=[...row.querySelectorAll('input')][nc]; if(!tgt) return false;
      e.preventDefault(); tgt.focus(); if(tgt.select) tgt.select(); return true; };
    const k=e.key;
    if(k==='Enter'){
      if(e.shiftKey){ focusCell(r-1,c); }
      else if(r===rows.length-1){ e.preventDefault(); inp.dispatchEvent(new Event('change')); pendingFocus={name,r:r+1,c}; addRow(name); }
      else focusCell(r+1,c);
    }
    else if(k==='ArrowDown'){ focusCell(r+1,c); }
    else if(k==='ArrowUp'){ focusCell(r-1,c); }
    else if(k==='ArrowLeft'){ if(inp.selectionStart===0 && inp.selectionEnd===0) focusCell(r,c-1); }
    else if(k==='ArrowRight'){ if(inp.selectionStart===inp.value.length && inp.selectionEnd===inp.value.length) focusCell(r,c+1); }
  });
}
function renderGrid(name, opts={}){
  const t=DB.tables[name];
  const wrap=el('div','grid-wrap');
  const tbl=el('table','grid');
  tbl.dataset.gridname=name;
  const thead=el('thead'); const htr=el('tr');
  t.cols.forEach((c,ci)=>{
    const th=el('th',null,c[1]);
    th.style.textAlign = c[2]==='num' ? 'right' : 'left';
    htr.appendChild(th);
  });
  if(!opts.noRowActions){ const th=el('th'); th.style.width='34px'; htr.appendChild(th); }
  thead.appendChild(htr); tbl.appendChild(thead);
  const tb=el('tbody');
  t.rows.forEach((row,ri)=>{
    const tr=el('tr');
    t.cols.forEach((c,ci)=>{
      const isNum=c[2]==='num', isDate=c[2]==='date';
      const td=el('td', isNum?'num':(isDate?'text':'text'));
      const inp=el('input');
      inp.value = isDate ? fmtDate(row[c[0]]) : (row[c[0]]==null?'':row[c[0]]);
      inp.dataset.k=c[0];
      inp.addEventListener('change',()=>{
        let val=inp.value.trim();
        if(isNum){ row[c[0]] = val===''?null:num(val); }
        else if(isDate){ row[c[0]] = val===''?'':toISO(val); inp.value=fmtDate(row[c[0]]); }
        else row[c[0]] = val;
        save(); if(opts.onEdit) opts.onEdit();
      });
      attachNav(inp,name);
      attachPaste(inp,name,ci,ri,opts);
      td.appendChild(inp); tr.appendChild(td);
    });
    if(!opts.noRowActions){
      const td=el('td','rowact');
      const b=el('button','iconbtn','×'); b.title='Delete row'; b.tabIndex=-1;
      b.onclick=()=>{ t.rows.splice(ri,1); save(); rerender(); if(opts.onEdit)opts.onEdit(); };
      td.appendChild(b); tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  wrap.appendChild(tbl);
  return wrap;
}

function addRow(name){
  const t=DB.tables[name]; const r={}; t.cols.forEach(c=>r[c[0]]=null); t.rows.push(r); save(); rerender();
}

/* card wrapper for an editable master table */
function tableCard(name, {tag,hint,onEdit}={}){
  const t=DB.tables[name];

  int:{font:{name:"Arial",sz:10},alignment:{horizontal:"right"},numFmt:"0",border:bd("E2E2E2")},
  txt:{font:{name:"Arial",sz:10},border:bd("E2E2E2")},
  date:{font:{name:"Arial",sz:10},numFmt:"d-mmm-yyyy",alignment:{horizontal:"left"},border:bd("E2E2E2")}
};
function bd(rgb){const s={style:"thin",color:{rgb:rgb}};return{top:s,bottom:s,left:s,right:s};}
function C(v,s){ return {v:v==null?"":v, t:typeof v==="number"?"n":"s", s:s||STY.txt}; }
function Cn(v,s){ if(v==null||v===""||isNaN(Number(v))) return C(v==null?"":v, s||STY.txt); return {v:Number(v),t:"n",s:s||STY.num}; }
function Cd(v,s){ const ser=excelSerial(v); if(ser==null) return C(v||"",s||STY.txt); return {v:ser,t:"n",s:s||STY.date}; }
function Ch(v,left){ return {v:v,t:"s",s:left?STY.hdrL:STY.hdr}; }
function Ct(v,s){ return {v:v,t:"s",s:s||STY.title}; }
function Cdt(){ return {v:dateSerial(),t:"n",s:{...STY.label,numFmt:"d-mmm-yyyy"}}; }

function wsFrom(rows, cols, merges){
  const ws={}; let maxR=0,maxC=0;
  rows.forEach((row,r)=>{ if(!row) return; row.forEach((cell,c)=>{ if(cell==null) return;
    ws[XLSX.utils.encode_cell({r,c})]=cell; if(r>maxR)maxR=r; if(c>maxC)maxC=c; }); });
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:Math.max(maxR,0),c:Math.max(maxC,0)}});
  if(cols) ws['!cols']=cols.map(w=>({wch:w}));
  if(merges) ws['!merges']=merges;
  return ws;
}
const T=n=>DB.tables[n].rows;
const dateSerial=()=>excelSerial(DB.meta.reportDate);

/* ---------- BUILDERS: each returns {file, sheets:[[name, rows2D, cols]]} ---------- */
function closingRows(){
  const bills=T('tbill'), bonds=T('tbond'), n=Math.max(bills.length,bonds.length); const rows=[];
  rows[1]=[C("Date :",STY.label), Cdt()];
  rows[3]=[Ct("T- Bills"),null,null,null,null,Ct("T- Bonds")];
  rows[4]=[Ch("ISIN",1),Ch("Maturity Date",1),Ch("OFFER"),Ch("BID"),null,Ch("ISIN",1),Ch("Maturity Date",1),Ch("OFFER"),Ch("BID")];
  for(let i=0;i<n;i++){ const r=[]; const b=bills[i], d=bonds[i];
    if(b){ r[0]=C(b.isin||""); r[1]=Cd(b.maturity); r[2]=Cn(b.offer); r[3]=Cn(b.bid); }
    if(d){ r[5]=C(d.isin||""); r[6]=Cd(d.maturity); r[7]=Cn(d.offer); r[8]=Cn(d.bid); }
    rows[5+i]=r; } return rows;
}
function buildClosing(){ return {file:"Closing.xlsx", sheets:[["Sheet1", closingRows(), [16,14,9,9,3,16,14,9,9]]]}; }
function buildFIS(){
  const rows=closingRows(); const call=T('call'), repo=T('repo');
  (rows[4]=rows[4]||[]); rows[4][11]=Ch("Call",1); rows[4][12]=Ch("BID"); rows[4][13]=Ch("OFFER");
  call.forEach((r,i)=>{ const rr=rows[5+i]||(rows[5+i]=[]); rr[11]=C(r.tenor||""); rr[12]=Cn(r.bid); rr[13]=Cn(r.offer); });
  const rp=5+call.length+1; const rh=rows[rp]||(rows[rp]=[]); rh[11]=Ch("REPO",1); rh[12]=Ch("BID"); rh[13]=Ch("OFFER");
  repo.forEach((r,i)=>{ const rr=rows[rp+1+i]||(rows[rp+1+i]=[]); rr[11]=C(r.tenor||""); rr[12]=Cn(r.bid); rr[13]=Cn(r.offer); });
  return {file:"FIS.xlsx", sheets:[["Sheet1", rows, [16,14,9,9,3,16,14,9,9,3,3,8,8,8]]]};
}
function premiumRows(){
  const p=T('premium'); const rows=[];
  rows[0]=[Cdt()]; rows[1]=[Ct(DB.meta.broker)];
  rows[3]=[C("National Development Bank PLC",STY.label)]; rows[4]=[C("Dharmapala Mawatha",STY.label)]; rows[5]=[C("Colombo 7.",STY.label)];
  rows[7]=[C("Attention : Manager - Treasury Operations",STY.label)];
  rows[9]=[C("Here are the Forward Premiums as of",STY.label),null,null,null,Cdt()];
  rows[11]=[Ct("SPOT - "+nf(DB.meta.spotBid,2)+"/"+nf(DB.meta.spotOffer,2))];
  rows[12]=[null,Ch("Bid"),Ch("Offer"),Ch("No.of Days")];
  p.forEach((r,i)=>{ rows[13+i]=[C(" "+(r.tenor||"")),Cn(r.bid,STY.int),Cn(r.offer,STY.int),Cn(r.nod,STY.int)]; });
  return rows;
}
function buildFX(){ return {file:"FX.xlsx", sheets:[["Premiums", premiumRows(), [10,10,10,12]]]}; }
function buildRatesShort(){
  const p=T('premium'), pick=['1W','2W','1M','2M','3M'], rows=[];
  rows[0]=[Ct(DB.meta.broker)]; rows[2]=[C("Attention : Manager - Treasury Operations",STY.label)];
  rows[4]=[C("Here are the Forward Premiums as of",STY.label),null,null,null,Cdt()];
  rows[5]=[C("Attention : Manager - Treasury Operations",STY.label)];
  rows[8]=[Ct("SPOT - "+nf(DB.meta.spotBid,2)+"/"+nf(DB.meta.spotOffer,2))];
  let ri=10; pick.forEach(tn=>{ const r=p.find(x=>String(x.tenor).toUpperCase()===tn); if(r){ rows[ri++]=[C(r.tenor),Cn(r.bid,STY.int),Cn(r.offer,STY.int)]; } });
  return {file:"Rates.xlsx", sheets:[["Premiums", rows, [10,10,10]]]};
}
function buildFXDet(){
  const p=T('premium'), rows=[];
  rows[2]=[null,Ch("TENOR"),Ch("NOD"),Ch("PAYER"),Ch("RECIEVER"),Ch("BID"),Ch("OFFER")];
  p.forEach((r,i)=>{ rows[3+i]=[null,C(" "+(r.tenor||"")),Cn(r.nod,STY.int),Cn(r.payer),Cn(r.receiver),Cn(r.bid,STY.int),Cn(r.offer,STY.int)]; });
  return {file:"FX_1.xlsx", sheets:[["Premiums", premiumRows(), [10,10,10,12]],["Sheet1", rows, [3,8,8,10,10,10,10]]]};
}
function buildSummary(){
  const rows=[]; const out=T('outright'), swap=T('swap'), repo=T('repo'), money=T('money'), tp=T('tbillPeriod'), bonds=T('tbond');
  rows[1]=[null,Ct("MVS"),C("To : Manager Global Markets Finance",STY.bold)];
  rows[3]=[null,null,C("Broker Name:",STY.label),C(DB.meta.broker,STY.bold)];
  rows[5]=[null,null,C("Date :",STY.label),Cdt()];
  rows[7]=[null,null,null,Ch("Bid"),Ch("Offer")];
  rows[8]=[null,null,C("SPOT",STY.bold),Cn(DB.meta.spotBid),Cn(DB.meta.spotOffer)];
  const outRest=out.filter(r=>String(r.period).toUpperCase()!=='SPOT');
  outRest.forEach((r,i)=>{ rows[9+i]=[null,null,C(r.period,STY.bold),Cn(r.bid),Cn(r.offer)]; });
  const shR=8+Math.max(1+outRest.length,4)+2;
  rows[shR]=[null,null,Ct("Swap points"),null,null,null,Ct("Repo"),null,null,Ct("Money")];
  rows[shR+1]=[null,null,Ch("Period",1),Ch("No.of Days"),Ch("Payer"),Ch("Receiver"),Ch("Period",1),Ch("Bid"),Ch("Offer"),Ch("Bid"),Ch("Offer")];
  swap.forEach((r,i)=>{ const rr=[null,null,C(r.period),Cn(r.nod,STY.int),Cn(r.payer,STY.int),Cn(r.receiver,STY.int)];
    if(repo[i]){ rr[6]=C(repo[i].tenor); rr[7]=Cn(repo[i].bid); rr[8]=Cn(repo[i].offer); }
    if(money[i]){ rr[9]=Cn(money[i].bid); rr[10]=Cn(money[i].offer); } rows[shR+2+i]=rr; });
  const tbR=shR+2+Math.max(swap.length,3)+2;
  rows[tbR]=[null,null,Ct("Treasury Bill Rates"),null,null,null,Ct("Treasury Bond Rates")];
  rows[tbR+1]=[null,null,Ch("Period",1),Ch("Offer"),Ch("Bid"),null,Ch("Maturity",1),Ch("Offer"),Ch("Bid")];
  const n=Math.max(tp.length,bonds.length);
  for(let i=0;i<n;i++){ const rr=[null,null];
    if(tp[i]){ rr[2]=C(tp[i].period); rr[3]=Cn(tp[i].offer); rr[4]=Cn(tp[i].bid); }
    if(bonds[i]){ rr[6]=Cd(bonds[i].maturity); rr[7]=Cn(bonds[i].offer); rr[8]=Cn(bonds[i].bid); }
    rows[tbR+2+i]=rr; }
  return {file:"Rates_2.xlsx", sheets:[["Sheet1", rows, [2,6,12,11,9,9,3,10,8,8,8]]]};
}
function buildLKR(){
  const p=T('premium'), lkr=T('lkr'), rows=[];
  rows[0]=[null,C("Date:",STY.label),Cdt()];
  rows[1]=[null,Ct(DB.meta.broker)];
  rows[3]=[null,Ct("SPOT - "+nf(DB.meta.spotBid,2)+"/"+nf(DB.meta.spotOffer,2)),null,null,null,null,Ch("LKR"),Ch("LKR OFFER")];
  rows[4]=[null,null,Ch("Bid"),Ch("Offer"),Ch("No.of Days")];
  p.forEach((r,i)=>{ rows[5+i]=rows[5+i]||[]; const rr=rows[5+i]; rr[1]=C(" "+(r.tenor||"")); rr[2]=Cn(r.bid,STY.int); rr[3]=Cn(r.offer,STY.int); rr[4]=Cn(r.nod,STY.int); });
  lkr.forEach((r,i)=>{ rows[4+i]=rows[4+i]||[]; const rr=rows[4+i]; rr[5]=C(r.tenor); rr[6]=(r.bid==null?C("-"):Cn(r.bid)); rr[7]=(r.offer==null?C("-"):Cn(r.offer)); });
  return {file:"Rates_3.xlsx", sheets:[["Sheet1", rows, [2,6,9,9,11,3,6,10]]]};
}
function buildBroker(){
  const bill=T('brokerBill'), bond=T('brokerBond'), brokers=DB.brokers; const rows=[]; const nData=Math.max(bill.length,bond.length);
  const r0=[], r2=[], r3=[];
  brokers.forEach((b,bi)=>{ const off=bi*7;
    r0[off]=Ct("BROKER A/C-"+b);
    r2[off]=Ch("TREASURY BILLS",1); r2[off+3]=Ch("TREASURY BONDS",1);
    r3[off]=Ch("Maturity Date",1); r3[off+1]=Ch("Bid Rate"); r3[off+2]=Ch("Ask Rate");
    r3[off+3]=Ch("Maturity Date",1); r3[off+4]=Ch("Bid Rate"); r3[off+5]=Ch("Ask Rate"); });
  rows[0]=r0; rows[2]=r2; rows[3]=r3;
  for(let i=0;i<nData;i++){ const rr=[]; brokers.forEach((b,bi)=>{ const off=bi*7, isMVS=b.includes('MVS');
      if(bill[i]){ rr[off]=Cd(bill[i].maturity); if(isMVS){ rr[off+1]=Cn(bill[i].bid); rr[off+2]=Cn(bill[i].ask);} }
      if(bond[i]){ rr[off+3]=Cd(bond[i].maturity); if(isMVS){ rr[off+4]=Cn(bond[i].bid); rr[off+5]=Cn(bond[i].ask);} } });
    rows[4+i]=rr; }
  const cols=[]; brokers.forEach(()=>cols.push(13,9,9,13,9,9,3));
  return {file:"T-Bill_T-Bond_Rate_Input_Sheet.xlsx", sheets:[["Broker Rate Sheet", rows, cols]]};
}
const BUILDERS=[buildClosing,buildFIS,buildFX,buildRatesShort,buildFXDet,buildSummary,buildLKR,buildBroker];

/* ---------- emit + verify ---------- */
function wbFromBuilt(built){ const wb=XLSX.utils.book_new();
  built.sheets.forEach(([nm,rows,cols])=>XLSX.utils.book_append_sheet(wb, wsFrom(rows,cols), nm)); return wb; }
function downloadBuilt(built){ XLSX.writeFile(wbFromBuilt(built), built.file); toast('Exported '+built.file); }

function verifyBuilt(built){
  const wb=wbFromBuilt(built);
  const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  const wb2=XLSX.read(buf,{type:'array'});
  let checked=0; const bad=[];
  built.sheets.forEach(([nm,rows])=>{
    const ws2=wb2.Sheets[nm];
    rows.forEach((row,r)=>{ if(!row) return; row.forEach((cell,c)=>{ if(cell==null||cell.t!=='n') return;
      checked++; const addr=XLSX.utils.encode_cell({r,c}); const got=ws2[addr]?ws2[addr].v:undefined;
      if(got===undefined || Math.abs(Number(got)-Number(cell.v))>1e-9){ bad.push(nm+'!'+addr); }
    }); });
  });
  return {file:built.file, checked, bad};
}
function verifyAll(){ return BUILDERS.map(b=>verifyBuilt(b())); }

function exportClosing(){ downloadBuilt(buildClosing()); }
function exportFIS(){ downloadBuilt(buildFIS()); }
function exportFX(){ downloadBuilt(buildFX()); }
function exportRatesShort(){ downloadBuilt(buildRatesShort()); }
function exportFXDet(){ downloadBuilt(buildFXDet()); }
function exportSummary(){ downloadBuilt(buildSummary()); }
function exportLKR(){ downloadBuilt(buildLKR()); }
function exportBroker(){ downloadBuilt(buildBroker()); }

/* ---------- boot ---------- */
buildNav(); bindMeta(); go('entry');
</script>
